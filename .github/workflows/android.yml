name: Build

on:
  push:
    branches:
      - main
      - '*' # Triggers on any branch push
  pull_request:
    branches:
      - main
    workflow_dispatch:
    inputs:
      build_type:
        description: 'Select Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      version_tag:
        description: 'Manual Version Tag'
        required: false
        default: 'manual'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KeyAttestation-${{ github.ref_name }}-${{ github.event.inputs.build_type || 'debug' }}
          # This wildcard will catch either the -debug.apk or the -release.apk
          path: app/build/outputs/apk/**/*.apk
