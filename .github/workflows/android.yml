name: Build

on:
  push:
    branches: [ main, * ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create GitHub Release"
        type: boolean
        required: false
        default: false
      version_tag:
        description: "Override version tag"
        required: false
        default: ""

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract versionName
        id: version
        run: |
          VERSION=$(grep -oP "versionName\s*=\s*'\K[^']+" app/build.gradle)
          if [ -z "$VERSION" ]; then
            echo "Failed to read versionName"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --parallel --build-cache

      - name: Prepare APK
        id: prep
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/

          VERSION="${{ steps.version.outputs.version }}"
          INPUT_TAG="${{ github.event.inputs.version_tag }}"

          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="v$VERSION"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT

          cd release
          for f in *.apk; do
            mv "$f" "KeyAttestation-$TAG.apk"
          done

      - name: Upload CI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: KeyAttestation-CI-${{ github.run_number }}
          path: release/*.apk

      - name: Create Release
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag }}
          name: KeyAttestation ${{ steps.prep.outputs.tag }}
          files: release/*.apk
