name: Build

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (e.g., 1.8.4)'
        required: false
        default: 'manual'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Build with Gradle
        run: ./gradlew assembleDebug --parallel --build-cache

      - name: Prepare Artifact
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/*.apk release/
          cd release
          # Uses input tag if provided, otherwise uses the run number
          TAG="${{ github.event.inputs.version_tag }}"
          if [ "$TAG" = "manual" ] || [ -z "$TAG" ]; then
            TAG="v${{ github.run_number }}"
          fi
          for f in *.apk; do mv "$f" "KeyAttestation-$TAG.apk"; done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KeyAttestation-Build-${{ github.run_number }}
          path: release/*.apk
