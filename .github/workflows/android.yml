name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Release Version / Tag (e.g., 2.1.0-shoey63-unofficial)'
        required: true
        default: '2.1.0-shoey63-unofficial'

jobs:
  build-and-release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    
    # Required permission to let the bot create the Release and Tag
    permissions:
      contents: write 

    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Build Release APK
        shell: bash
        run: |
          echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          ./gradlew assembleRelease

      - name: Rename APK
        shell: bash
        run: |
          # Finds whatever APK gradle spat out (signed or unsigned) and renames it using your input
          find app/build/outputs/apk/release/ -name "*.apk" -exec mv {} app/build/outputs/apk/release/Key-Attestation_${{ github.event.inputs.version_name }}-release.apk \;

      - name: Create GitHub Release and Tag
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.event.inputs.version_name }}
          name: Release ${{ github.event.inputs.version_name }}
          files: app/build/outputs/apk/release/Key-Attestation_${{ github.event.inputs.version_name }}-release.apk
          generate_release_notes: true
